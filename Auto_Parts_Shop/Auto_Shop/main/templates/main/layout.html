{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.6.0/css/all.css">
</head>
<body>
    <aside>
        <img src="{% static 'main/png/logo.png' %}" alt="Лого">
        <span class="logo">AutoParts</span>
        <h3>Навигация</h3>
        <ul>
            <a href="{% url 'home' %}"><li><i class="fa-solid fa-house" style="color: rgb(99, 230, 190);"></i>Главная</li></a>
            <a href="{% url 'about' %}"><li><i class="fa-solid fa-pager" style="color: rgb(99, 230, 190);"></i>Про нас</li></a>
            <a href="{% url 'user_profile' %}"><li><i class="fa-solid fa-user" style="color: rgb(99, 230, 190);"></i>Профиль</li></a>
            <a href=""><li><i class="fa-solid fa-paper-plane" style="color: rgb(99, 230, 190);"></i>Контакты</li></a>

        </ul>
    </aside>
    <mai>
        {% block content %}
        {% endblock %}
    </mai>
</body>
</html>
